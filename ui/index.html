<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldmap Live</title>
    <link href="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #04040e; }
        #globeViz { width: 100vw; height: 100vh; }
        #basemap-picker-host {
            position: absolute; top: 12px; right: 12px; z-index: 5;
        }
        .basemap-picker {
            display: flex; flex-direction: column; gap: 2px;
            background: rgba(20,22,28,0.78); padding: 6px 8px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            font: 12px/1.2 system-ui, sans-serif; color: #cfd3da;
            backdrop-filter: blur(4px);
        }
        .basemap-picker__label { font-weight: 600; opacity: 0.7; }
        .basemap-picker__select {
            background: #1b1e24; color: #e6e8ec; border: 1px solid rgba(255,255,255,0.18);
            border-radius: 4px; padding: 3px 6px; font: inherit;
        }
        .basemap-picker__select:disabled { opacity: 0.5; }

        /* Subtle Settings Button */
        #settingsBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 100;
        }
        #settingsBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        #zoomDisplay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }
        /* Add this container to hold your keys */
        #legend-stack {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none; /* Let map clicks through */
        }
        .legend-slot {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
    <div id="legend-stack"></div>
    <script src="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.js"></script>
</head>
<body>
    <a href="/config/" id="settingsBtn" target="_blank">Configuration Control</a>
    <div id="basemap-picker-host"></div>

    <div id="globeViz"></div>

    <script type="module">
        async function bootstrapWorldmap() {
            try {
                // 1. Fetch live application configuration block from backend API
                const response = await fetch('http://localhost:9000/api/config');
                const fullConfig = await response.json();
                const configData = fullConfig.data;

                // 2. Extract dynamically injected key out of the standard common section
                const maptilerKey = configData.common?.api_key || '';

                // Starting view of the globe
                const startingLatitude = configData.common?.starting_latitude || 0.0;
                const startingLongitude = configData.common?.starting_longitude || 0.0;

                if (configData.common?.RULE__missing_maptiler) {
                    console.warn("MapTiler API Key missing! Check your host .env configuration.");
                }

                // Build the style, guaranteeing a glyphs endpoint so text labels
                // (e.g. the place-markers layer) always render even if the satellite
                // style ships without one. Fetch the style, patch glyphs if absent,
                // and hand MapLibre the object; on any failure fall back to the URL.
                const styleUrl = `https://api.maptiler.com/maps/satellite/style.json?key=${maptilerKey}`;
                let mapStyle = styleUrl;
                try {
                    const styleJson = await (await fetch(styleUrl)).json();
                    if (!styleJson.glyphs) {
                        styleJson.glyphs = `https://api.maptiler.com/fonts/{fontstack}/{range}.pbf?key=${maptilerKey}`;
                        console.info('[markers] injected MapTiler glyphs endpoint for label rendering.');
                    }
                    mapStyle = styleJson;
                } catch (err) {
                    console.warn('Could not pre-fetch map style to verify glyphs; using style URL as-is.', err);
                }

                // Initialize the map core
                const map = new maplibregl.Map({
                    container: 'globeViz',
                    style: mapStyle,
                    center: [startingLatitude, startingLongitude],
                    zoom: 2.5, // Start zoomed out to see the globe shape immediately
                    projection: 'globe' // Start with a spherical projection
                });

                const { buildBasemapStyle, mountBasemapPicker } = await import(`/basemap.js?t=${Date.now()}`);

                // ---- Layer mounting + teardown registry ----------------------------
                // setStyle() (basemap swap) wipes every layer and source, including our
                // custom WebGL data layers. So we keep the list of per-layer cleanup
                // functions returned by each loadLayer, run them all before a swap, and
                // re-mount after the new style loads. Layers not yet returning a cleanup
                // are still removed by id as a safety net so they can't duplicate.
                const ALL_LAYERS = [
                    'sst', 'currents', 'waves', 'ozone', 'temperature', 'clouds',
                    'terminator',
                    'precipitation', 'stormwatch', 'wind', 'isobars',
                    'quakes', 'volcanoes', 'lightning', 'storms',
                    'shipping', 'satellites',
                    'markers'
                ];
                let layerCleanups = [];

                const mountAllLayers = async () => {
                    for (const moduleName of ALL_LAYERS) {
                        try {
                            const module = await import(`/modules/${moduleName}.js?t=${Date.now()}`);
                            // loadLayer may return a cleanup fn (newer modules) or nothing.
                            const cleanup = await module.loadLayer(map, configData[moduleName] || {}, configData);
                            if (typeof cleanup === 'function') layerCleanups.push(cleanup);
                        } catch (err) {
                            console.warn(`Could not load layer /modules/${moduleName}.js`, err);
                        }
                    }
                };

                const teardownAllLayers = () => {
                    for (const cleanup of layerCleanups) {
                        try { cleanup(); } catch (err) { console.warn('layer cleanup failed', err); }
                    }
                    layerCleanups = [];
                };

                // ---- One-time setup (runs once, NOT on every style swap) ------------
                let oneTimeDone = false;
                const oneTimeSetup = async () => {
                    if (oneTimeDone) return;
                    oneTimeDone = true;

                    // Track user interaction so auto-rotation doesn't fight dragging
                    let isUserInteracting = false;
                    map.on('movestart', () => { isUserInteracting = true; });
                    map.on('moveend', () => { isUserInteracting = false; });

                    if (configData.common && configData.common.auto_rotate === true) {
                        const rotationSpeed = configData.common.auto_rotate_speed || 0.1;
                        const rotateGlobe = () => {
                            if (!isUserInteracting) {
                                const center = map.getCenter();
                                center.lng = (center.lng + rotationSpeed) % 360;
                                map.setCenter(center);
                            }
                            requestAnimationFrame(rotateGlobe);
                        };
                        rotateGlobe();
                    }

                    window.MAP_UI = "http://localhost:9000";
                    window.WM_API = "http://localhost:9000/api";

                    // Boot the shared forecast timeline + scrubber BEFORE layers mount.
                    try {
                        const { initForecastTimeline } = await import(`/modules/timeline_boot.js?t=${Date.now()}`);
                        await initForecastTimeline(configData);
                    } catch (err) {
                        console.warn('Could not init forecast timeline', err);
                    }

                    // Basemap picker — swaps the style, preserving camera, re-mounting layers.
                    try {
                        let currentSlug = configData.common?.basemap || 'satellite';
                        const host = document.getElementById('basemap-picker-host') || document.body;
                        mountBasemapPicker(host, currentSlug, async (slug) => {
                            if (slug === currentSlug) return;
                            const cam = { center: map.getCenter(), zoom: map.getZoom(),
                                          bearing: map.getBearing(), pitch: map.getPitch() };
                            teardownAllLayers();                 // stop intervals/handlers, remove custom layers
                            const newStyle = await buildBasemapStyle(slug, maptilerKey);
                            currentSlug = slug;
                            map.setStyle(newStyle);              // wipes layers; 'style.load' re-mounts
                            map.once('style.load', () => {
                                map.setProjection({ type: 'globe' });
                                map.jumpTo(cam);                 // restore camera
                            });
                        });
                    } catch (err) {
                        console.warn('Could not mount basemap picker', err);
                    }
                };

                // ---- style.load: fires on initial load AND after every setStyle ------
                // Re-establish the globe projection and (re)mount all data layers each
                // time. One-time setup is guarded so it runs only once.
                map.on('style.load', async () => {
                    map.setProjection({ type: 'globe' });
                    await oneTimeSetup();
                    teardownAllLayers();     // clear any prior registry before re-mounting
                    await mountAllLayers();
                });

            } catch (err) {
                console.error("Failed to bootstrap runtime configuration framework:", err);
            }
        }

        // Initialize execution setup
        bootstrapWorldmap();
    </script>
</body>
</html>
