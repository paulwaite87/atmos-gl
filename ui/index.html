<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldmap Live</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #04040e; }
        #globeViz { width: 100vw; height: 100vh; }

        /* Subtle Settings Button */
        #settingsBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 100;
        }
        #settingsBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three",
                "three/": "https://esm.sh/three/",
                "globe.gl": "https://esm.sh/globe.gl"
            }
        }
    </script>
</head>
<body>
    <a href="/config/" id="settingsBtn">⚙️ Settings</a>
    <div id="globeViz"></div>

    <script type="module">
        import * as THREE from 'three';
        import Globe from 'globe.gl';

        const response = await fetch('http://localhost:9000/api/get_map_path');
        const mapData = await response.json();
        const map_path = mapData.data;

        // Initialize Base Globe
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('http://localhost:9000/' + map_path)
            .backgroundColor('#04040e');

        // Load the base Composite Map
        const cacheBuster = "?t=" + new Date().getTime();
        new THREE.TextureLoader().load('http://localhost:9000/data/composite_layer.png' + cacheBuster, texture => {
            texture.needsUpdate = true;
            const weatherSphere = new THREE.Mesh(
                new THREE.SphereGeometry(100.5, 73, 73),
                new THREE.MeshBasicMaterial({
                    map: texture, transparent: true, depthWrite: false, side: THREE.DoubleSide
                })
            );
            weatherSphere.rotation.y = Math.PI / 2;
            world.scene().add(weatherSphere);
        });

        // The Dynamic Module Loader
        async function loadDynamicLayers() {
            try {
                const response = await fetch('http://localhost:9000/api/config');
                const fullConfig = await response.json();

                // Using the data nested in the JSON response
                const configData = fullConfig.data;

                // --- NEW: Apply Global Settings ---
                if (configData.common) {
                    // Check explicitly for true, fallback to false
                    world.controls().autoRotate = configData.common.auto_rotate === true;
                    // Set the speed, falling back to 0.1 if missing
                    world.controls().autoRotateSpeed = configData.common.auto_rotate_speed || 0.1;
                }

                const frontendLayers = ['quakes', 'shipping', 'satellites', 'volcanoes', 'lightning', 'storms'];

                for (const moduleName of frontendLayers) {
                    const moduleConfig = configData[moduleName];

                    if (moduleConfig && moduleConfig.enabled === true) {
                        try {
                            // Import local JS files served by Nginx
                            const module = await import(`/modules/${moduleName}.js`);
                            module.loadLayer(world, moduleConfig);
                        } catch (err) {
                            console.warn(`Could not load /modules/${moduleName}.js`, err);
                        }
                    }
                }
            } catch (err) {
                console.error("Failed to fetch configuration", err);
            }
        }

        loadDynamicLayers();
    </script>
</body>
</html>
