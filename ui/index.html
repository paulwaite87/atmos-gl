<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldmap Live</title>
    <link href="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #04040e; }
        #globeViz { width: 100vw; height: 100vh; }

        /* Subtle Settings Button */
        #settingsBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 100;
        }
        #settingsBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
    <script src="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.js"></script>
</head>
<body>
    <a href="/config/" id="settingsBtn" target="_blank">Configuration Control</a>

    <div id="globeViz"></div>

    <script type="module">
        async function bootstrapWorldmap() {
            try {
                // 1. Fetch live application configuration block from backend API
                const response = await fetch('http://localhost:9000/api/config');
                const fullConfig = await response.json();
                const configData = fullConfig.data;

                // 2. Extract dynamically injected key out of the standard common section
                const maptilerKey = configData.common?.api_key || '';

                if (configData.common?.RULE__missing_maptiler) {
                    console.warn("MapTiler API Key missing! Check your host .env configuration.");
                }

                // Initialize the map core
                const map = new maplibregl.Map({
                    container: 'globeViz', // or whatever your map DIV ID is
                    style: `https://api.maptiler.com/maps/satellite/style.json?key=${maptilerKey}`,
                    center: [0, 0],
                    zoom: 1 // Start zoomed out to see the globe shape immediately
                });

                // CRITICAL: Wait for the style configuration to finish loading before activating the globe
                map.on('style.load', () => {
                    map.setProjection({
                        type: 'globe'
                    });
                });

                // 4. Once vector layout stylesheet loads successfully, morph projection into 3D space
                map.on('style.load', async () => {  // <-- Added 'async' right here!
                    map.setProjection({ type: 'globe' });

                    // Track user interaction state so auto-rotation doesn't fight map dragging
                    let isUserInteracting = false;
                    map.on('movestart', () => { isUserInteracting = true; });
                    map.on('moveend', () => { isUserInteracting = false; });

                    // Apply Global Auto-Rotation Settings if flagged enabled
                    if (configData.common && configData.common.auto_rotate === true) {
                        const rotationSpeed = configData.common.auto_rotate_speed || 0.1;

                        const rotateGlobe = () => {
                            if (!isUserInteracting) {
                                const center = map.getCenter();
                                center.lng = (center.lng + rotationSpeed) % 360;
                                map.setCenter(center);
                            }
                            requestAnimationFrame(rotateGlobe);
                        };
                        rotateGlobe();
                    }

                    // 5. Sequentially initialize backend active feature modules
                    // Best practice ordering: Base textures first, vector data points on top
                    const frontendLayers = [
                        'clouds',       // Bottom layer (wraps over baseline satellite imagery)
                        'isobars',      // Sits right on top of the clouds
                        'shipping',     // Vessels render over weather charts
                        'quakes',       // Points/markers stay perfectly visible on top
                        'satellites'
                    ];

                    for (const moduleName of frontendLayers) {
                        const moduleConfig = configData[moduleName];

                        if (moduleConfig && moduleConfig.enabled === true) {
                            try {
                                // Dynamic file import now works perfectly inside this async callback block
                                const module = await import(`/modules/${moduleName}.js`);

                                // Direct high-performance map context injected into your layer scripts
                                module.loadLayer(map, moduleConfig);
                            } catch (err) {
                                console.warn(`Could not load layer /modules/${moduleName}.js`, err);
                            }
                        }
                    }
                });

            } catch (err) {
                console.error("Failed to bootstrap runtime configuration framework:", err);
            }
        }

        // Initialize execution setup
        bootstrapWorldmap();
    </script>
</body>
</html>
