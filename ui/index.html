<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos GL Live</title>
    <link href="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #04040e; }
        #globeViz { width: 100vw; height: 100vh; }
        #basemap-picker-host {
            position: absolute; top: 65px; right: 12px; z-index: 5;
        }
        .basemap-picker {
            display: flex; flex-direction: column; gap: 2px;
            background: rgba(20,22,28,0.78); padding: 6px 8px; border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            font: 12px/1.2 system-ui, sans-serif; color: #cfd3da;
            backdrop-filter: blur(4px);
        }
        .basemap-picker__label { font-weight: 600; opacity: 0.7; }
        .basemap-picker__select {
            background: #1b1e24; color: #e6e8ec; border: 1px solid rgba(255,255,255,0.18);
            border-radius: 4px; padding: 3px 6px; font: inherit;
        }
        .basemap-picker__select:disabled { opacity: 0.5; }

        /* Subtle Settings Button */
        #settingsBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            z-index: 100;
        }
        #settingsBtn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        #zoomDisplay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: sans-serif;
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }
        #legend-stack {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }
        .legend-slot {
            background: rgba(0, 0, 0, 0.6);
            padding: 5px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* The only legend content that's live text rather than an <img> (wind.js's
               gradient bar) had no font-family of its own, so it fell back to the
               browser's serif default -- every backend-rendered key PNG (precipitation,
               sst, etc.) renders sans-serif via matplotlib's own default font, so this
               is the one place client-built legend text needs to match. */
            font-family: sans-serif;
        }
    </style>
    <script src="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.js"></script>
</head>
<body>
    <div id="legend-stack"></div>
    <a href="http://localhost:9000/config" id="settingsBtn" target="_blank">Configuration Control</a>
    <div id="basemap-picker-host"></div>
    <div id="zoomDisplay"></div>

    <div id="globeViz"></div>

    <script type="module">
        async function bootstrapAtmosGL() {
            try {
                // 1. Fetch live application configuration block from backend API
                const response = await fetch('http://localhost:9000/api/config');
                const fullConfig = await response.json();
                const configData = fullConfig.data;

                // 2. Extract dynamically injected key
                const maptilerKey = configData.common?.api_key || '';
                const startingLatitude = configData.common?.starting_latitude || 0.0;
                const startingLongitude = configData.common?.starting_longitude || 0.0;

                if (configData.common?.RULE__missing_maptiler) {
                    console.warn("MapTiler API Key missing! Check your host .env configuration.");
                }

                const styleUrl = `https://api.maptiler.com/maps/satellite/style.json?key=${maptilerKey}`;
                let mapStyle = styleUrl;
                try {
                    const styleJson = await (await fetch(styleUrl)).json();
                    if (!styleJson.glyphs) {
                        styleJson.glyphs = `https://api.maptiler.com/fonts/{fontstack}/{range}.pbf?key=${maptilerKey}`;
                        console.info('[markers] injected MapTiler glyphs endpoint for label rendering.');
                    }
                    mapStyle = styleJson;
                } catch (err) {
                    console.warn('Could not pre-fetch map style to verify glyphs; using style URL as-is.', err);
                }

                // Initialize the map core
                const map = new maplibregl.Map({
                    container: 'globeViz',
                    style: mapStyle,
                    center: [startingLongitude, startingLatitude],
                    zoom: 2.5,
                    projection: 'globe' // Start with a spherical projection
                });

                // Live zoom-level readout (bottom-left overlay; #zoomDisplay in the <style>
                // block above already had its styling -- this is the element + wiring).
                const zoomDisplay = document.getElementById('zoomDisplay');
                const updateZoom = () => {
                    zoomDisplay.innerText = `Zoom: ${map.getZoom().toFixed(2)}`;
                };
                map.on('zoom', updateZoom);
                map.on('load', updateZoom);

                // ---- Layer mounting + teardown registry (HOISTED) -------------------
                const ALL_LAYERS = [
                    'sst', 'currents', 'waves', 'ozone', 'temperature', 'pwat', 'clouds',
                    'terminator', 'precipitation', 'stormwatch', 'wind', 'jetstream', 'isobars',
                    'quakes', 'volcanoes', 'fires', 'lightning', 'storms', 'shipping', 'satellites',
                    'markers', 'flightradar'
                ];
                let layerCleanups = [];
                let layersMounted = false;
                let mountInFlight = false;
                let oneTimeDone = false;

                const mountAllLayers = async () => {
                    // Promise.allSettled prevents one broken layer module from stopping the rest
                    await Promise.allSettled(ALL_LAYERS.map(async (moduleName) => {
                        try {
                            // Removed ?t=${Date.now()} to prevent memory leaks on style swaps
                            const module = await import(`/modules/${moduleName}.js`);
                            const cleanup = await module.loadLayer(map, configData[moduleName] || {}, configData);
                            if (typeof cleanup === 'function') layerCleanups.push(cleanup);
                        } catch (err) {
                            console.warn(`Could not load layer /modules/${moduleName}.js`, err);
                        }
                    }));
                };

                const teardownAllLayers = () => {
                    for (const cleanup of layerCleanups) {
                        try { cleanup(); } catch (err) { console.warn('layer cleanup failed', err); }
                    }
                    layerCleanups = [];
                };

                // ---- One-time setup (HOISTED) ---------------------------------------
                const oneTimeSetup = async () => {
                    if (oneTimeDone) return;
                    oneTimeDone = true;

                    let isUserInteracting = false;
                    map.on('movestart', () => { isUserInteracting = true; });
                    map.on('moveend', () => { isUserInteracting = false; });

                    if (configData.common && configData.common.auto_rotate === true) {
                        const rotationSpeed = configData.common.auto_rotate_speed || 0.1;
                        const rotateGlobe = () => {
                            if (!isUserInteracting) {
                                const center = map.getCenter();
                                center.lng = (center.lng + rotationSpeed) % 360;
                                map.setCenter(center);
                            }
                            requestAnimationFrame(rotateGlobe);
                        };
                        rotateGlobe();
                    }

                    window.MAP_UI = "http://localhost:9000";
                    window.WM_API = "http://localhost:9000/api";

                    try {
                        const { initForecastTimeline } = await import(`/modules/timeline_boot.js`);
                        await initForecastTimeline(configData);
                    } catch (err) {
                        console.warn('Could not init forecast timeline', err);
                    }
                };

                // ---- ATMOSPHERE / SKY (config-gated by common.atmosphere) -----------
                // Procedural globe halo + starfield (no data — pure stagecraft to make the
                // planet read as a 3D body in space). setStyle wipes sky/fog/light, so this
                // is re-applied on every style.load alongside the projection. When the
                // terminator layer is enabled, the sun/light is synced to the real subsolar
                // point (shared with the terminator shadow) so the day/night shading aligns.
                let sunPollId = null;

                // Convert a subsolar lat/lon into MapLibre's globe light position
                // [radial, azimuth, polar]. Globe lighting with anchor:'map' has a rotated
                // axis; this is the community-verified correction (maplibre-gl-js #5240).
                const lightPosition = (lat, lon) => {
                    const sin = (d) => Math.sin(d * Math.PI / 180);
                    const cos = (d) => Math.cos(d * Math.PI / 180);
                    const acos = (v) => Math.acos(Math.max(-1, Math.min(1, v))) * 180 / Math.PI;
                    const b = acos(cos(lat) * cos(lon));
                    const a = acos(sin(lat) / Math.max(1e-6, sin(b * Math.PI / 180)));
                    return [-1, a, b];
                };

                const applySun = async () => {
                    try {
                        const r = await fetch(`${window.WM_API}/terminator/geojson?t=${Date.now()}`);
                        if (!r.ok) return;
                        const fc = await r.json();
                        const ss = fc && fc.subsolar;
                        if (!ss) return;
                        map.setLight({ anchor: 'map', color: 'white', intensity: 0.5,
                                       position: lightPosition(ss.lat, ss.lon) });
                    } catch (e) { /* leave default light on failure */ }
                };

                const setupAtmosphere = () => {
                    if (!configData.common?.atmosphere) return;
                    try {
                        // Sky halo + hazy limb: strong at whole-globe zoom, fading out as you
                        // zoom in (atmosphere only reads at planet scale). MapLibre merged the
                        // old Mapbox-style setFog() into setSky() -- color/high-color/
                        // space-color/star-intensity no longer exist, and fog-* properties
                        // need 3D terrain (unavailable on a bare globe) -- so sky-color/
                        // horizon-color now carry the same "space above, blue haze at the
                        // limb" look that setFog used to.
                        map.setSky({
                            'sky-color': 'rgba(2,3,8,1)',          // near-black space, upper sky
                            'horizon-color': 'rgba(30,50,90,1)',   // hazy upper-atmosphere blue at the limb
                            'sky-horizon-blend': 0.8,
                            'atmosphere-blend': ['interpolate', ['linear'], ['zoom'], 0, 1, 5, 1, 7, 0],
                        });
                        // Sync the sun to the real subsolar point only when the terminator
                        // layer is on; otherwise leave MapLibre's default light.
                        if (sunPollId) { clearInterval(sunPollId); sunPollId = null; }
                        if (configData.terminator?.enabled) {
                            applySun();
                            sunPollId = setInterval(applySun, 60000);   // sun drifts ~0.25°/min
                        }
                    } catch (err) {
                        console.warn('[atmosphere] could not apply sky/fog; continuing.', err);
                    }
                };

                // ---- THE SYNCHRONOUS MOUNT HANDLER ----------------------------------
                const onStyleLoadMount = async () => {
                    if (mountInFlight || layersMounted) return;
                    mountInFlight = true;
                    try {
                        map.setProjection({ type: 'globe' });
                        setupAtmosphere();          // re-apply sky/fog/sun (wiped by setStyle)
                        await oneTimeSetup();
                        await mountAllLayers();
                        layersMounted = true;
                    } finally {
                        mountInFlight = false;
                    }
                };

                // Attach IMMEDIATELY. No `awaits` between map creation and this block.
                map.on('style.load', onStyleLoadMount);
                // Catch the event if it already fired while synchronous code was executing
                if (map.isStyleLoaded()) {
                    onStyleLoadMount();
                }

                // ---- BASEMAP PICKER (Awaited SAFELY at the end) ---------------------
                try {
                    const { buildBasemapStyle, mountBasemapPicker } = await import(`/basemap.js`);
                    if (mountBasemapPicker && buildBasemapStyle) {
                        let currentSlug = configData.common?.basemap || 'satellite';
                        const host = document.getElementById('basemap-picker-host') || document.body;

                        mountBasemapPicker(host, currentSlug, async (slug) => {
                            if (slug === currentSlug) return;
                            const cam = {
                                center: map.getCenter(), zoom: map.getZoom(),
                                bearing: map.getBearing(), pitch: map.getPitch()
                            };

                            teardownAllLayers();
                            layersMounted = false;

                            const newStyle = await buildBasemapStyle(slug, maptilerKey);
                            currentSlug = slug;

                            map.once('style.load', () => { map.jumpTo(cam); });
                            map.setStyle(newStyle);
                        });
                    }
                } catch (err) {
                    console.warn('[basemap] picker unavailable; continuing without it.', err);
                }

            } catch (err) {
                console.error("Failed to bootstrap runtime configuration framework:", err);
            }
        }

        // Initialize execution setup
        bootstrapAtmosGL();
    </script>
</body>
</html>
