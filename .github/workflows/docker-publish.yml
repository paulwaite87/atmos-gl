name: Publish Docker Images to GHCR

# Triggers the workflow when a pull request targeting master is closed,
# or when you manually trigger it from the GitHub Actions tab
on:
  pull_request:
    branches: [ "master" ]
    types: [ "closed" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # This automatically evaluates to paulwaite87/atmos-gl
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Only execute if the pull request was closed due to a successful merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    # Grants the workflow permission to write to your Packages registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Push Main Python App
      - name: Build and push main app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # Build and Push UI
      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ui
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ui:latest
