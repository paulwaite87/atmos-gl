on:
  pull_request:
  push:
    branches:
      - master
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          # Pinned so this step never has to ask GitHub's API for "latest" -- that
          # lookup started failing intermittently (unrelated to this repo's code) and
          # pinning both routes around it and keeps CI reproducible.
          version: "0.11.8"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Ruff
        # `uv run` (not a separate `pip install ruff`) so this uses the exact version
        # pyproject.toml's dev dependency-group + uv.lock resolved (ruff>=0.15.11),
        # not whatever's newest on PyPI at run time -- a prior unpinned `pip install
        # ruff` picked up a same-day release with new default-enabled rules and failed
        # CI on ~70 files with no code change involved, purely a version drift.
        run: uv run ruff check ./src
      - name: Bootstrap live config from template
        run: cp config/atmos-gl.json.tmpl config/atmos-gl.json
      - name: Run pytest
        run: uv run pytest tests/ -q
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install npm dependencies
        run: npm ci
      - name: Run vitest
        run: npm test
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run shader tests
        run: npm run test:shaders
