# docker-compose.override.yml — DEVELOPER overlay (auto-merged by `docker compose`).
#
# The base docker-compose.yml is the consumer/production config: it runs the published
# GHCR images with nothing mounted over the code, so anyone can `docker compose up` and
# get a self-contained stack. This override adds, for local development only:
#   * build: blocks   — so you can rebuild an image when DEPENDENCIES or the Dockerfile
#                        change (`make build`); and
#   * a live source mount (.:/opt/project) — so ordinary CODE edits are picked up by a
#                        simple service restart, no rebuild.
#
# Compose concatenates list values (volumes), so the base ./data and ./config mounts are
# preserved and the source mount is added on top. Because Compose loads this file
# automatically, YOUR `docker compose up` is dev-mode; a consumer who only has the base
# file (or runs `docker compose -f docker-compose.yml up`) gets the clean published images.

services:
  shipping_collector:
    build: &app-build
      context: files
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    volumes:
      - .:/opt/project

  data_collector:
    build: *app-build
    volumes:
      - .:/opt/project

  satellites_collector:
    build: *app-build
    volumes:
      - .:/opt/project

  weather_scanner:
    build: *app-build
    volumes:
      - .:/opt/project

  layer_builder:
    build: *app-build
    volumes:
      - .:/opt/project

  housekeeper:
    build: *app-build
    volumes:
      - .:/opt/project

  map_api:
    build: *app-build
    volumes:
      - .:/opt/project

  # In dev, serve the UI straight from the working tree (live edits) using the stock
  # nginx image, instead of the baked -ui image.
  map_ui:
    image: nginxinc/nginx-unprivileged:alpine
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro

  # In dev, run stock postgis and mount the init SQL from the tree, so schema edits in
  # config/database/ apply on a fresh volume without rebuilding the -db image.
  worldmap_db:
    image: postgis/postgis:15-3.3
    volumes:
      - ./config/database:/docker-entrypoint-initdb.d
