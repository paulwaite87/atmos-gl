# docker-compose.override.yml — DEVELOPER overlay (auto-merged by `docker compose`).
#
# The base docker-compose.yml is the consumer/production config: published GHCR images,
# nothing mounted over the code. This override makes LOCAL DEV self-contained — it builds
# a local image and bind-mounts the source, and crucially it NEVER pulls from GHCR:
#   * image: worldmap:latest  — overrides the GHCR ref with a local tag, so dev doesn't
#                               touch the registry (no "denied" if the package is private
#                               or not yet published).
#   * pull_policy: build      — Compose builds rather than pulls.
#   * build:                   — rebuild when DEPENDENCIES or the Dockerfile change.
#   * .:/opt/project           — live source; ordinary CODE edits need only a restart.
#
# Compose concatenates list values (volumes), so the base ./data and ./config mounts are
# kept and the source mount is added. A consumer who only has the base file (or runs
# `docker compose -f docker-compose.yml up`) gets the clean published images.

x-app-dev: &app-dev
  image: worldmap:latest
  pull_policy: build
  build:
    context: .
    dockerfile: Dockerfile
    args:
      UID: "${UID:-1000}"
      GID: "${GID:-1000}"
  volumes:
    - .:/opt/project

services:
  data_collector:
    <<: *app-dev
  layer_builder:
    <<: *app-dev
  housekeeper:
    <<: *app-dev
  map_api:
    <<: *app-dev
  worldmap_db_migrate:
    <<: *app-dev

  # Dev: serve the UI from the working tree (live edits) via stock nginx.
  map_ui:
    image: nginxinc/nginx-unprivileged:alpine
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro