worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    gzip  on;

    # UI server. The server block lives here (not in conf.d) so this single mounted
    # file fully defines behaviour; the stock conf.d/default.conf is intentionally NOT
    # included to avoid a duplicate server.
    server {
        listen       8080;
        server_name  localhost;
        root         /usr/share/nginx/html;
        index        index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # JS modules change during development, and ES-module *sub-imports*
        # (e.g. waves.js -> ./_windparticles.js) bypass index.html's ?t= cache-bust.
        # "no-cache" = the browser must revalidate every load: nginx returns 304 when
        # the file is unchanged (cheap) and 200 with fresh bytes when it changed, so a
        # stale module can never be pinned again. Keep an ETag for the 304s.
        location ~* \.js$ {
            add_header Cache-Control "no-cache";
            etag on;
        }
    }
}