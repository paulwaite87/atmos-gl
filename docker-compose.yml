      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
