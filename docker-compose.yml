name: atmos-gl
services:
  data_collector:
    image: ghcr.io/paulwaite87/atmos-gl:latest
    command: python -m atmos_gl.collectors.service --config /opt/project/config/atmos-gl.json
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - AIS_API_KEY=${AIS_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - FIRMS_API_KEY=${FIRMS_API_KEY}
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=atmos_gl_db
      - PGPORT=5432
      - PGDATABASE=atmos_gl
      - PGUSER=agl
      - PGPASSWORD=agl
    restart: unless-stopped
    depends_on:
      atmos_gl_db:
        condition: service_healthy
      atmos_gl_db_migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
    networks:
      - agl

  layer_builder:
    image: ghcr.io/paulwaite87/atmos-gl:latest
    command: python -m atmos_gl.layer_builder --config /opt/project/config/atmos-gl.json
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=atmos_gl_db
      - PGPORT=5432
      - PGDATABASE=atmos_gl
      - PGUSER=agl
      - PGPASSWORD=agl
    restart: unless-stopped
    depends_on:
      atmos_gl_db:
        condition: service_healthy
      atmos_gl_db_migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - ./markers:/opt/project/markers
    networks:
      - agl

  housekeeper:
    image: ghcr.io/paulwaite87/atmos-gl:latest
    command: python -m atmos_gl.housekeeper --config /opt/project/config/atmos-gl.json
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
    networks:
      - agl

  map_api:
    image: ghcr.io/paulwaite87/atmos-gl:latest
    # Reverted to a simpler runtime installation since agluser now owns the virtual environment
    command: >
      bash -c "uv pip install fastapi uvicorn && python -m uvicorn atmos_gl.api:app --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=atmos_gl_db
      - PGPORT=5432
      - PGDATABASE=atmos_gl
      - PGUSER=agl
      - PGPASSWORD=agl
      - CONFIG_PATH=/opt/project/config/atmos-gl.json
      - MAPTILER_API_KEY=${MAPTILER_API_KEY}
      - FIRMS_API_KEY=${FIRMS_API_KEY}
    restart: unless-stopped
    depends_on:
      atmos_gl_db:
        condition: service_healthy
      atmos_gl_db_migrate:
        condition: service_completed_successfully
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
    networks:
      - agl

  map_ui:
    image: ghcr.io/paulwaite87/atmos-gl-ui:latest
    ports:
      - "8180:8080"
    restart: unless-stopped
    depends_on:
      - map_api
    networks:
      - agl

  atmos_gl_db_init:
    image: alpine:latest
    command: >
      sh -c "chown ${UID:-1000}:${GID:-1000} /var/lib/postgresql/data && 
             chown ${UID:-1000}:${GID:-1000} /var/log/postgresql"
    volumes:
      - agl-pgdata:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    networks:
      - agl

  atmos_gl_db:
    image: postgis/postgis:15-3.3
    # The database STILL needs the user directive because it uses a pre-built image,
    # not your custom Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      atmos_gl_db_init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: agl
      POSTGRES_PASSWORD: agl
      POSTGRES_DB: atmos_gl
      PGTZ: Pacific/Auckland
    ports:
      - "15432:5432"
    restart: unless-stopped
    volumes:
      - agl-pgdata:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    command: >
      postgres
      -c max_wal_size=512MB
      -c min_wal_size=128MB
      -c checkpoint_timeout=15min
      -c log_checkpoints=off
      -c logging_collector=on
      -c log_destination=stderr
      -c log_statement=all
      -c log_directory=/var/log/postgresql
      -c log_filename='postgresql.log'
      -c log_rotation_size=10MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agl -d atmos_gl"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - agl

  atmos_gl_db_migrate:
    image: ghcr.io/paulwaite87/atmos-gl:latest
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - PYTHONPATH=/opt/project/src
      - PGHOST=atmos_gl_db
      - PGPORT=5432
      - PGDATABASE=atmos_gl
      - PGUSER=agl
      - PGPASSWORD=agl
    depends_on:
      atmos_gl_db:
        condition: service_healthy
    networks:
      - agl

networks:
  agl:
    driver: bridge

volumes:
  agl-pgdata:
  postgres_logs:
