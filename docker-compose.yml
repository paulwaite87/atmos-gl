services:
  worldmap:
    container_name: worldmap
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - AIS_API_KEY=${AIS_API_KEY}
      - TZ=Pacific/Auckland
    restart: unless-stopped
    volumes:
      # Mount the data dir for persistence (maps, json dbs, markers)
      - ./data:/opt/project/data
      - ./config:/opt/project/config
    healthcheck:
      # Check if quake_markers.txt has been touched in the last 120 minutes.
      # Note: Since the daemon might only run map updates hourly, and the
      # shift changes to harvesting at night, 30m might be too aggressive
      # for a general healthcheck. Adjust based on your 'update_sleep'.
      test: ["CMD", "find", "/opt/project/data/quake_markers.txt", "-mmin", "-120"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 5m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"