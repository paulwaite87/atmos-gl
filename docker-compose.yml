services:
  shipping_collector:
    container_name: shipping_collector
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    command: python -m worldmap.shipping_collector --config /opt/project/config/worldmap.json
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - AIS_API_KEY=${AIS_API_KEY}
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  data_collector:
    container_name: data_collector
