  housekeeper:
    container_name: housekeeper
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    command: python -m worldmap.housekeeper --config /opt/project/config/worldmap.json
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  map_api:
    container_name: map_api
    image: worldmap:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: "${UID:-1000}"
        GID: "${GID:-1000}"
    # Reverted to a simpler runtime installation since wmapuser now owns the virtual environment
    command: >
      bash -c "uv pip install fastapi uvicorn && python -m uvicorn worldmap.api:app --host 0.0.0.0 --port 9000"
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - TZ=Pacific/Auckland
      - PYTHONPATH=/opt/project/src
      - PYTHONUNBUFFERED=1
      - PGHOST=worldmap_db
      - PGPORT=5432
      - PGDATABASE=worldmap
      - PGUSER=wmap
      - PGPASSWORD=wmap
      - CONFIG_PATH=/opt/project/config/worldmap.json
      - MAPTILER_API_KEY=${MAPTILER_API_KEY}
    restart: unless-stopped
    depends_on:
      worldmap_db:
        condition: service_healthy
    volumes:
      - ./data:/opt/project/data
      - ./config:/opt/project/config
      - .:/opt/project
    networks:
      - wmap

  map_ui:
    container_name: map_ui
    image: nginxinc/nginx-unprivileged:alpine
    ports:
      - "8180:8080"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - map_api
    networks:
      - wmap

  worldmap_db_init:
    container_name: worldmap_db_init
    image: alpine:latest
    command: >
      sh -c "chown ${UID:-1000}:${GID:-1000} /var/lib/postgresql/data && 
             chown ${UID:-1000}:${GID:-1000} /var/log/postgresql"
    volumes:
      - wmap-pgdata:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    networks:
      - wmap

  worldmap_db:
    container_name: worldmap_db
    image: postgis/postgis:15-3.3
    # The database STILL needs the user directive because it uses a pre-built image, not your custom Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      worldmap_db_init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: wmap
      POSTGRES_PASSWORD: wmap
      POSTGRES_DB: worldmap
      PGTZ: Pacific/Auckland
    ports:
      - "15432:5432"
    restart: unless-stopped
    volumes:
      - wmap-pgdata:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
      - ./config/database:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c max_wal_size=512MB
      -c min_wal_size=128MB
      -c checkpoint_timeout=15min
      -c log_checkpoints=off
      -c logging_collector=on
      -c log_destination=stderr
      -c log_statement=all
      -c log_directory=/var/log/postgresql
      -c log_filename='postgresql.log'
      -c log_rotation_size=10MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wmap -d worldmap"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wmap

networks:
  wmap:
    driver: bridge

volumes:
  wmap-pgdata:
  postgres_logs: